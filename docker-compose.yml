version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Defaults to local DB, but can be overridden by setting DATABASE_URL in .env
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/inventory_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/ethara
      dockerfile: Dockerfile
    container_name: inventory_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend


volumes:
  postgres_data:
